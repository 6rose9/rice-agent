<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <!-- Circular badge (trust, commerce) -->
  <circle cx="50" cy="50" r="47" stroke="#4A9E6A" stroke-width="3"/>

  <!-- Left rice stalk (green) -->
  <path d="M22 72 C18 54 24 38 34 28" stroke="#4A9E6A" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Right rice stalk (green) -->
  <path d="M78 72 C82 54 76 38 66 28" stroke="#4A9E6A" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Left stalk germinated rice grains -->
  <g transform="translate(16, 35) rotate(-25)">
    <path d="M 0 0 C 2 -2, 9 -2, 11 0 C 9 2, 2 2, 0 0Z" fill="#D4A843" stroke="#B8942F" stroke-width="0.5"/>
    <path d="M 0 0 L -5 -6" stroke="#7CB342" stroke-width="1.2" stroke-linecap="round"/>
    <path d="M -5 -6 L -6 -4" stroke="#7CB342" stroke-width="0.8" stroke-linecap="round"/>
  </g>
  <g transform="translate(15, 48) rotate(-20)">
    <path d="M 0 0 C 2 -2, 9 -2, 11 0 C 9 2, 2 2, 0 0Z" fill="#D4A843" stroke="#B8942F" stroke-width="0.5"/>
    <path d="M 0 0 L -5 -6" stroke="#7CB342" stroke-width="1.2" stroke-linecap="round"/>
    <path d="M -5 -6 L -6 -4" stroke="#7CB342" stroke-width="0.8" stroke-linecap="round"/>
  </g>
  <g transform="translate(17, 61) rotate(-15)">
    <path d="M 0 0 C 2 -2, 9 -2, 11 0 C 9 2, 2 2, 0 0Z" fill="#D4A843" stroke="#B8942F" stroke-width="0.5"/>
    <path d="M 0 0 L -5 -6" stroke="#7CB342" stroke-width="1.2" stroke-linecap="round"/>
    <path d="M -5 -6 L -6 -4" stroke="#7CB342" stroke-width="0.8" stroke-linecap="round"/>
  </g>

  <!-- Right stalk germinated rice grains -->
  <g transform="translate(84, 35) rotate(25)">
    <path d="M 0 0 C -2 -2, -9 -2, -11 0 C -9 2, -2 2, 0 0Z" fill="#D4A843" stroke="#B8942F" stroke-width="0.5"/>
    <path d="M 0 0 L 5 -6" stroke="#7CB342" stroke-width="1.2" stroke-linecap="round"/>
    <path d="M 5 -6 L 6 -4" stroke="#7CB342" stroke-width="0.8" stroke-linecap="round"/>
  </g>
  <g transform="translate(85, 48) rotate(20)">
    <path d="M 0 0 C -2 -2, -9 -2, -11 0 C -9 2, -2 2, 0 0Z" fill="#D4A843" stroke="#B8942F" stroke-width="0.5"/>
    <path d="M 0 0 L 5 -6" stroke="#7CB342" stroke-width="1.2" stroke-linecap="round"/>
    <path d="M 5 -6 L 6 -4" stroke="#7CB342" stroke-width="0.8" stroke-linecap="round"/>
  </g>
  <g transform="translate(83, 61) rotate(15)">
    <path d="M 0 0 C -2 -2, -9 -2, -11 0 C -9 2, -2 2, 0 0Z" fill="#D4A843" stroke="#B8942F" stroke-width="0.5"/>
    <path d="M 0 0 L 5 -6" stroke="#7CB342" stroke-width="1.2" stroke-linecap="round"/>
    <path d="M 5 -6 L 6 -4" stroke="#7CB342" stroke-width="0.8" stroke-linecap="round"/>
  </g>

  <!-- Two people (heads) -->
  <circle cx="38" cy="48" r="8" fill="#3D5A42"/>
  <circle cx="62" cy="48" r="8" fill="#3D5A42"/>

  <!-- Bodies -->
  <path d="M38 56 L35 75" stroke="#3D5A42" stroke-width="3" stroke-linecap="round"/>
  <path d="M62 56 L65 75" stroke="#3D5A42" stroke-width="3" stroke-linecap="round"/>

  <!-- Arms reaching for handshake -->
  <path d="M38 62 L50 65" stroke="#3D5A42" stroke-width="3" stroke-linecap="round"/>
  <path d="M62 62 L50 65" stroke="#3D5A42" stroke-width="3" stroke-linecap="round"/>

  <!-- Handshake clasp (accent gold) -->
  <path d="M44 62 L50 70 L56 62" stroke="#D4A843" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
